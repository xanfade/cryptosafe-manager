name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest

      - run: pytest -q
